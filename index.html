<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учёт приборов (тест)</title>
    <style>
        /* Стили (можно оставить свои) */
    </style>
</head>
<body>
<div class="container" id="app">Загрузка...</div>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script>
    const PUBLIC_KEY = "uJh4LJh2vH0Chw";
    // Используем публичный прокси, который точно работает
    const PROXY_URL = "https://autumn-queen-abbe.kirik7061.workers.dev/";

    (async () => {
        try {
            console.log("1. Начинаем загрузку данных...");
            const yandexApiUrl = `https://cloud-api.yandex.net/v1/disk/public/resources/download?public_key=https://disk.yandex.ru/i/${PUBLIC_KEY}`;
            const proxiedApiUrl = PROXY_URL + encodeURIComponent(yandexApiUrl);
            console.log("2. Запрос к API через прокси:", proxiedApiUrl);
            
            const response = await fetch(proxiedApiUrl);
            console.log("3. Статус ответа API:", response.status);
            if (!response.ok) throw new Error(`Ошибка API: ${response.status}`);
            
            const data = await response.json();
            console.log("4. Получен href:", data.href);
            if (!data.href) throw new Error("Нет ссылки на скачивание");
            
            const proxiedFileUrl = PROXY_URL + encodeURIComponent(data.href);
            console.log("5. Загрузка файла по:", proxiedFileUrl);
            
            const fileResponse = await fetch(proxiedFileUrl);
            console.log("6. Статус загрузки файла:", fileResponse.status);
            if (!fileResponse.ok) throw new Error(`Ошибка файла: ${fileResponse.status}`);
            
            const blob = await fileResponse.blob();
            console.log("7. Файл загружен, размер:", blob.size);
            
            // Чтение Excel
            const workbook = XLSX.read(await blob.arrayBuffer(), { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
            console.log("8. Прочитано строк:", rows.length);
            if (rows.length < 2) throw new Error("Нет данных в таблице");
            
            // Преобразуем в объекты
            const instruments = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length < 2) continue;
                instruments.push({
                    id: String(row[0] || i),
                    name: row[1] || "Без названия",
                    // ... остальные поля по необходимости
                });
            }
            console.log("9. Создано приборов:", instruments.length);
            document.getElementById('app').innerHTML = `<div>Успех! Загружено ${instruments.length} приборов. Первый: ${instruments[0].name}</div>`;
        } catch (e) {
            console.error("❌ Ошибка:", e);
            document.getElementById('app').innerHTML = `<div class="error">Ошибка: ${e.message}</div>`;
        }
    })();
</script>
</body>
</html>
