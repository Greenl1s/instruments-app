<script>
    // ========== НАСТРОЙКИ ==========
    const PUBLIC_KEY = "kAXYp4XPyNJAWg";
    const PROXY_URL = "https://autumn-queen-abbe.kirik7061.workers.dev/?url=";
    const WRITE_SECRET = "mySecretKey123";
    const OAUTH_TOKEN = "y0__wgBEK3T6dMDGMuvQiCp95HVFzD38tqJCD_9zO1sUwHlVUnaAOeiJ_uRkBA1";
    // ================================

    let currentInstruments = [];
    let currentHistory = [];

    // ---------- Функция поиска первого свободного ID ----------
    function getNextAvailableId() {
        const ids = currentInstruments
            .map(inst => parseInt(inst.id, 10))
            .filter(num => !isNaN(num) && num > 0);
        if (ids.length === 0) return 1;
        ids.sort((a, b) => a - b);
        let expected = 1;
        for (const id of ids) {
            if (id === expected) expected++;
            else if (id > expected) break;
        }
        return expected;
    }

    // ---------- Сортировка приборов по ID (числовому) ----------
    function sortInstrumentsById() {
        currentInstruments.sort((a, b) => {
            const idA = parseInt(a.id, 10);
            const idB = parseInt(b.id, 10);
            if (isNaN(idA)) return 1;
            if (isNaN(idB)) return -1;
            return idA - idB;
        });
    }

    // ---------- Закрытие модального окна ----------
    function closeModal() {
        const modal = document.getElementById('customModal');
        if (modal) modal.style.display = 'none';
    }

    // ---------- Работа с пользователями (синхронизация с Excel) ----------
    async function loadUsersFromExcel() {
        try {
            const yandexApiUrl = `https://cloud-api.yandex.net/v1/disk/public/resources/download?public_key=https://disk.yandex.ru/i/${PUBLIC_KEY}`;
            const proxiedApiUrl = PROXY_URL + encodeURIComponent(yandexApiUrl);
            const response = await fetch(proxiedApiUrl);
            if (!response.ok) return null;
            const data = await response.json();
            if (!data.href) return null;
            const proxiedFileUrl = PROXY_URL + encodeURIComponent(data.href);
            const fileResponse = await fetch(proxiedFileUrl);
            const blob = await fileResponse.blob();
            const workbook = XLSX.read(await blob.arrayBuffer(), { type: 'array' });
            const sheet = workbook.Sheets["Пользователи"];
            if (!sheet) return [];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
            if (!rows || rows.length < 2) return [];
            const users = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length < 2) continue;
                const username = row[0]?.toString().trim();
                const password = row[1]?.toString().trim();
                const role = row[2]?.toString().trim() === 'admin' ? 'admin' : 'employee';
                if (username && password) users.push({ username, password, role });
            }
            return users;
        } catch(e) {
            console.error("Ошибка загрузки пользователей из Excel", e);
            return null;
        }
    }

    async function saveUsersToExcel(users) {
        try {
            const yandexApiUrl = `https://cloud-api.yandex.net/v1/disk/public/resources/download?public_key=https://disk.yandex.ru/i/${PUBLIC_KEY}`;
            const proxiedApiUrl = PROXY_URL + encodeURIComponent(yandexApiUrl);
            const response = await fetch(proxiedApiUrl);
            if (!response.ok) throw new Error("Не удалось загрузить файл");
            const data = await response.json();
            if (!data.href) throw new Error("Нет ссылки");
            const proxiedFileUrl = PROXY_URL + encodeURIComponent(data.href);
            const fileResponse = await fetch(proxiedFileUrl);
            const blob = await fileResponse.blob();
            const workbook = XLSX.read(await blob.arrayBuffer(), { type: 'array' });
            
            const sheetData = [["Имя пользователя", "Пароль", "Роль"]];
            for (const u of users) {
                sheetData.push([u.username, u.password, u.role === 'admin' ? 'admin' : 'employee']);
            }
            const ws = XLSX.utils.aoa_to_sheet(sheetData);
            workbook.Sheets["Пользователи"] = ws;
            if (!workbook.SheetNames.includes("Пользователи")) workbook.SheetNames.push("Пользователи");
            
            const wbout = XLSX.write(workbook, { bookType: 'xlsx', type: 'array' });
            const blobOut = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            
            const proxyBase = PROXY_URL.split('?')[0];
            const uploadResp = await fetch(`${proxyBase}?get_upload_url=1`, {
                headers: { 'X-Write-Secret': WRITE_SECRET }
            });
            if (!uploadResp.ok) throw new Error("Не удалось получить ссылку для загрузки");
            const { href } = await uploadResp.json();
            const putResp = await fetch(href, { method: 'PUT', body: blobOut, headers: { 'Content-Type': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' } });
            if (!putResp.ok) throw new Error("Ошибка загрузки");
        } catch (err) {
            console.error("Ошибка сохранения пользователей в Excel:", err);
        }
    }

    async function initUsers() {
        try {
            const excelUsers = await loadUsersFromExcel();
            if (excelUsers && excelUsers.length > 0) {
                usersCache = excelUsers;
                localStorage.setItem('app_users', JSON.stringify(usersCache));
            } else {
                let localUsers = localStorage.getItem('app_users');
                if (!localUsers) {
                    const defaultUsers = [{ username: 'admin', password: 'admin', role: 'admin' }];
                    localStorage.setItem('app_users', JSON.stringify(defaultUsers));
                    usersCache = defaultUsers;
                    await saveUsersToExcel(defaultUsers);
                } else {
                    usersCache = JSON.parse(localUsers);
                    await saveUsersToExcel(usersCache);
                }
            }
        } catch (e) {
            console.error("Ошибка инициализации пользователей", e);
            let localUsers = localStorage.getItem('app_users');
            if (!localUsers) {
                localUsers = [{ username: 'admin', password: 'admin', role: 'admin' }];
                localStorage.setItem('app_users', JSON.stringify(localUsers));
            }
            usersCache = JSON.parse(localUsers);
        }
    }

    function getUsers() { return usersCache; }
    function saveUsersLocally(users) {
        usersCache = users;
        localStorage.setItem('app_users', JSON.stringify(users));
        saveUsersToExcel(users);
    }

    function addUser(username, password, role) {
        const users = getUsers();
        if (users.find(u => u.username === username)) return false;
        users.push({ username, password, role });
        saveUsersLocally(users);
        return true;
    }

    function updateUser(oldUsername, newUsername, newPassword, newRole) {
        const users = getUsers();
        const index = users.findIndex(u => u.username === oldUsername);
        if (index === -1) return false;
        if (newUsername !== oldUsername && users.find(u => u.username === newUsername)) return false;
        users[index] = { username: newUsername, password: newPassword, role: newRole };
        saveUsersLocally(users);
        return true;
    }

    function deleteUser(username) {
        if (username === 'admin') return false;
        const users = getUsers();
        const newUsers = users.filter(u => u.username !== username);
        saveUsersLocally(newUsers);
        return true;
    }

    function validateUser(username, password) {
        const users = getUsers();
        const user = users.find(u => u.username === username && u.password === password);
        return user ? { username: user.username, role: user.role } : null;
    }

    // ---------- Управление сессией ----------
    function hasAccess(allowedRoles) {
        if (!currentUser) return false;
        return allowedRoles.includes(currentUser.role);
    }

    function logout() {
        currentUser = null;
        sessionStorage.removeItem('instrumentUser');
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('app').innerHTML = '';
    }

    function login(username, password) {
        const user = validateUser(username, password);
        if (user) {
            currentUser = user;
            sessionStorage.setItem('instrumentUser', JSON.stringify(currentUser));
            document.getElementById('loginOverlay').style.display = 'none';
            renderApp();
            showMessage(`Добро пожаловать, ${username}!`);
        } else {
            showMessage('Неверное имя пользователя или пароль', true);
        }
    }

    function checkSession() {
        const savedUser = sessionStorage.getItem('instrumentUser');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            document.getElementById('loginOverlay').style.display = 'none';
        } else {
            document.getElementById('loginOverlay').style.display = 'flex';
        }
    }

    // ---------- Формы управления сотрудниками (только для админа) ----------
    function showAddUserForm() {
        const formHtml = `
            <div class="form-group"><label>Имя сотрудника</label><input type="text" id="newUsername" placeholder="ivanov"></div>
            <div class="form-group"><label>Пароль</label><input type="password" id="newPassword" placeholder="придумайте пароль"></div>
            <div class="form-group"><label>Права доступа</label>
                <select id="newRole">
                    <option value="employee">Сотрудник</option>
                    <option value="admin">Администратор</option>
                </select>
            </div>
            <div class="button-group">
                <button class="btn btn-add-user" id="confirmAddUserBtn">➕ Добавить сотрудника</button>

            </div>

        showModal('Добавление нового сотрудника', formHtml);

    function showManageUsersForm() {

                    <div>

                        ${u.username !== 'admin' ? `<button class="btn btn-small btn-delete" onclick="deleteUserAccount('${u.username}')">🗑️</button>` : ''}
                    </div>
                </div>
            `;
        });
        const formHtml = `
            <div id="usersList">${rowsHtml}</div>

                <button class="btn btn-add-user" onclick="showAddUserForm()">➕ Добавить сотрудника</button>
                <button class="btn btn-clear" id="closeUsersBtn">Закрыть</button>
            </div>
        `;
        showModal('Управление сотрудниками', formHtml);

        const users = getUsers();
        const user = users.find(u => u.username === oldUsername);

        const formHtml = `

            <div class="form-group"><label>Права доступа</label>
                <select id="editRole">
                    <option value="employee" ${user.role === 'employee' ? 'selected' : ''}>Сотрудник</option>
                    <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Администратор</option>

            </div>

        if (confirm(`Удалить пользователя ${username}?`)) {

    // ---------- Редактирование профиля текущего пользователя ----------

        function renderCalendar(y, m) {
            const firstDay = new Date(y, m, 1).getDay();
            const daysInMonth = new Date(y, m + 1, 0).getDate();
            const today = new Date();
            
            const verificationDates = currentInstruments
                .map(inst => inst.verification_date)

                .map(d => new Date(d + 'T00:00:00'));
            const dateSet = new Set(verificationDates.map(d => d.toDateString()));

            let html = `<div class="calendar-header">

            </div>
            <div class="calendar-grid">`;
            const weekdays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
            for (let d of weekdays) {
                html += `<div class="day header">${d}</div>`;
            }
            let startOffset = (firstDay === 0) ? 6 : firstDay - 1;
            for (let i = 0; i < startOffset; i++) {
                html += `<div class="day other-month"></div>`;
            }
            for (let day = 1; day <= daysInMonth; day++) {
                const dateObj = new Date(y, m, day);
                const dateStr = dateObj.toDateString();
                const isToday = dateObj.toDateString() === today.toDateString();
                const hasEvent = dateSet.has(dateStr);
                let classes = 'day';
                if (isToday) classes += ' today';
                if (hasEvent) classes += ' has-event';
                html += `<div class="${classes}">${day}</div>`;
            }
            html += `</div>`;
            return html;
        }

        function openCalendar() {
            const content = `
                <div id="calendarContainer">
                    ${renderCalendar(year, month)}
                </div>
                <div class="button-group"><button class="btn btn-clear" onclick="closeModal()">Закрыть</button></div>
            `;
            showModal('📅 Календарь поверок', content);
            window._calendarYear = year;
            window._calendarMonth = month;
            window._calendarUpdate = () => {
                const container = document.getElementById('calendarContainer');
                if (container) {
                    container.innerHTML = renderCalendar(window._calendarYear, window._calendarMonth);
                }
            };
            window.changeMonth = (delta) => {
                let newMonth = window._calendarMonth + delta;
                let newYear = window._calendarYear;
                if (newMonth < 0) { newMonth = 11; newYear--; }
                if (newMonth > 11) { newMonth = 0; newYear++; }
                window._calendarMonth = newMonth;
                window._calendarYear = newYear;
                if (window._calendarUpdate) window._calendarUpdate();
            };
        }

        openCalendar();
    }

    async function saveToYandex() {
        try {
            const proxyBase = PROXY_URL.split('?')[0];
            const response = await fetch(`${proxyBase}?get_upload_url=1`, {
                headers: { 'X-Write-Secret': WRITE_SECRET }
            });
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error || `HTTP ${response.status}`);
            }
            const { href } = await response.json();
            if (!href) throw new Error("Нет ссылки для загрузки");

            const headersRow = ["ID", "Наименование", "Серийный номер", "Модель", "Тип",
                                "Дата поверки", "Действительно до", "Ссылка на документ",
                                "Кто взял", "Место использования", "Дата выдачи", "Состояние"];
            const wsData = [
                headersRow,
                ...currentInstruments.map(inst => [
                    inst.id, inst.name, inst.serial_number, inst.model, inst.type,
                    inst.verification_date, inst.valid_until, inst.document_url,
                    inst.taken_by, inst.taken_where, inst.taken_date,
                    inst.condition || 'free'
                ])
            ];
            const wsInstruments = XLSX.utils.aoa_to_sheet(wsData);

            const historyHeaders = ["ID прибора", "Название", "Кто взял", "Место использования", "Дата выдачи", "Кто вернул", "Дата возврата"];
            const historyData = [
                historyHeaders,
                ...currentHistory.map(rec => [
                    rec.id, rec.name, rec.takenBy, rec.takenWhere, rec.issuedDate, rec.returnedBy || "", rec.returnDate || ""
                ])
            ];
            const wsHistory = XLSX.utils.aoa_to_sheet(historyData);

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, wsInstruments, "Приборы");
            XLSX.utils.book_append_sheet(wb, wsHistory, "История");
            const users = getUsers();
            const usersSheetData = [["Имя пользователя", "Пароль", "Роль"]];
            for (const u of users) {
                usersSheetData.push([u.username, u.password, u.role === 'admin' ? 'admin' : 'employee']);
            }
            const wsUsers = XLSX.utils.aoa_to_sheet(usersSheetData);
            XLSX.utils.book_append_sheet(wb, wsUsers, "Пользователи");

            const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
            const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

            const putResponse = await fetch(href, {
                method: 'PUT',
                body: blob,
                headers: { 'Content-Type': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }
            });
            if (!putResponse.ok) throw new Error(`Ошибка загрузки: ${putResponse.status}`);
            console.log("Данные сохранены на Диск");
        } catch (err) {
            console.error("Ошибка сохранения:", err);
            showMessage("Ошибка сохранения на Диск", true);
        }
    }

            returnDate: returnDate
        });

    // ---------- Загрузка данных (с поддержкой нового столбца) ----------
    async function getTableData() {
        const yandexApiUrl = `https://cloud-api.yandex.net/v1/disk/public/resources/download?public_key=https://disk.yandex.ru/i/${PUBLIC_KEY}`;
        const proxiedApiUrl = PROXY_URL + encodeURIComponent(yandexApiUrl);
        const response = await fetch(proxiedApiUrl);
        if (!response.ok) throw new Error(`Ошибка API: ${response.status}`);
        const data = await response.json();
        if (!data.href) throw new Error("Нет ссылки на скачивание");
        const proxiedFileUrl = PROXY_URL + encodeURIComponent(data.href);
        const fileResponse = await fetch(proxiedFileUrl);
        if (!fileResponse.ok) throw new Error(`Ошибка загрузки файла: ${fileResponse.status}`);
        const blob = await fileResponse.blob();
        if (blob.size < 100) throw new Error("Скачан пустой файл");
        return await readExcelFromBlob(blob);
    }

    function readExcelFromBlob(blob) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    let instruments = [];
                    const sheetInstr = workbook.Sheets["Приборы"];
                    if (sheetInstr) {
                        const rows = XLSX.utils.sheet_to_json(sheetInstr, { header: 1, defval: "" });
                        if (rows && rows.length > 1) {
                            for (let i = 1; i < rows.length; i++) {
                                const row = rows[i];
                                if (!row || row.length === 0) continue;
                                if (row[0] === undefined || row[0] === "") continue;
                                instruments.push({
                                    id: String(row[0]),
                                    name: row[1] || '',
                                    serial_number: row[2] || '',
                                    model: row[3] || '',
                                    type: row[4] || '',
                                    verification_date: formatDateFromExcel(row[5]),
                                    valid_until: formatDateFromExcel(row[6]),
                                    document_url: row[7] || '',
                                    taken_by: row[8] || '',
                                    taken_where: row[9] || '',
                                    taken_date: formatDateFromExcel(row[10]),
                                    condition: row[11] || 'free'
                                });
                            }
                        }
                    }
                    let history = [];
                    const sheetHist = workbook.Sheets["История"];
                    if (sheetHist) {
                        const rows = XLSX.utils.sheet_to_json(sheetHist, { header: 1, defval: "" });
                        if (rows && rows.length > 1) {
                            for (let i = 1; i < rows.length; i++) {
                                const row = rows[i];
                                if (!row || row.length < 7) continue;
                                history.push({
                                    id: String(row[0] || ''),
                                    name: row[1] || '',
                                    takenBy: row[2] || '',
                                    takenWhere: row[3] || '',
                                    issuedDate: row[4] || '',
                                    returnedBy: row[5] || null,
                                    returnDate: row[6] || null
                                });
                            }
                        }
                    }
                    resolve({ instruments, history });
                } catch(e) { reject(e); }
            };
            reader.onerror = reject;
            reader.readAsArrayBuffer(blob);
        });
    }

    function formatDateFromExcel(dateValue) {
        if (!dateValue) return '';
        let str = String(dateValue).trim();
        const match = str.match(/(\d{4})-(\d{2})-(\d{2})/);
        if (match) return match[0];
        if (typeof dateValue === 'number') {
            const date = new Date((dateValue - 25569) * 86400 * 1000);
            if (!isNaN(date.getTime())) return date.toISOString().slice(0,10);
        }
        return str.slice(0,10);
    }

    // ---------- Возврат прибора (с проверкой прав) ----------
    function returnInstrument(instrument) {
        if (!currentUser) {
            showMessage('Ошибка: вы не авторизованы', true);
            return;
        }

        // Проверяем, кто взял прибор
        const takenBy = instrument.taken_by;
        const isAdmin = currentUser.role === 'admin';

        // Если прибор не взят – возвращать нечего
        if (!takenBy || takenBy.trim() === '') {
            showMessage('Прибор уже на месте', true);
            return;
        }

        // Логика проверки прав:
        // 1. Если администратор – можно вернуть любой прибор
        // 2. Если обычный пользователь – можно вернуть только свой
        if (!isAdmin && takenBy !== currentUser.username) {
            showMessage(`❌ Вы не можете вернуть этот прибор. Его взял(а) ${takenBy}`, true);
            return;
        }

        const returnDate = new Date().toISOString().slice(0,10);
        const returnedBy = isAdmin ? currentUser.username : takenBy; // если админ, пишем его имя, иначе имя того, кто взял

        // Закрываем запись в истории
        closeHistoryEntry(instrument, returnDate, returnedBy);

        // Очищаем поля выдачи
        instrument.taken_by = '';
        instrument.taken_where = '';
        instrument.taken_date = '';
        if (instrument.condition !== 'broken') {
            instrument.condition = 'free';
        }

        renderApp();
        saveToYandex().then(() => {
            const msg = isAdmin ? `✅ Прибор возвращён администратором ${currentUser.username}` : '✅ Прибор возвращён';
            showMessage(msg);
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

        const inst = window.currentInstrument;
        const dateLabel = inst.type === 'Поверка' ? 'Дата поверки' : 'Дата калибровки';
        const text = `Название: ${inst.name}\nСерийный номер: ${inst.serial_number || '—'}\nМодель: ${inst.model || '—'}\nТип: ${inst.type || '—'}\n${dateLabel}: ${inst.verification_date || '—'}\nДействительно до: ${inst.valid_until || '—'}\nСсылка на документ: ${inst.document_url || '—'}`;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => showMessage("✅ Информация скопирована!")).catch(() => showMessage("❌ Ошибка копирования", true));
        } else {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showMessage("✅ Информация скопирована!");
        }
    };

    // --- Карточка прибора ---
    function renderCard(inst) {
        const verifText = getVerificationText(inst.valid_until);
        const verifClass = getVerificationClass(inst.valid_until);
        const conditionText = getConditionText(inst.condition);
        const conditionClass = getConditionClass(inst.condition);
        const hasTaken = inst.taken_by && inst.taken_by.trim() !== '';
        const takenHtml = hasTaken ? `
            <div class="issued-info">
                <div class="field"><div class="field-label">Кто взял</div><div class="field-value">${escapeHtml(inst.taken_by)}</div></div>
                <div class="field"><div class="field-label">Место использования</div><div class="field-value">${escapeHtml(inst.taken_where) || '—'}</div></div>
                <div class="field"><div class="field-label">Дата выдачи</div><div class="field-value">${escapeHtml(inst.taken_date) || '—'}</div></div>
            </div>
        ` : '';
        const docLink = inst.document_url && inst.document_url !== 'nan' ? `<a href="${escapeHtml(inst.document_url)}" target="_blank">📄 Открыть документ</a>` : '—';
        const dateLabel = inst.type === 'Поверка' ? 'Дата поверки' : 'Дата калибровки';

        // Логика кнопки "Положить прибор"
        let issueButton = '';
        if (hasTaken) {
            const isAdmin = currentUser && currentUser.role === 'admin';
            const isOwner = currentUser && inst.taken_by === currentUser.username;
            // Показываем кнопку, если:
            // - пользователь администратор
            // - или пользователь является тем, кто взял прибор
            if (isAdmin || isOwner) {
                issueButton = `<button class="btn btn-clear" onclick="returnInstrument(currentInstrument)">📦 Положить прибор</button>`;
            } else {
                // Если прибор взят другим пользователем, показываем серую кнопку-заглушку
                issueButton = `<button class="btn btn-return-disabled" disabled title="Этот прибор взял(а) ${escapeHtml(inst.taken_by)}">📦 Положить прибор</button>`;
            }
        } else {
            // Если прибор свободен, показываем кнопку "Взять прибор" (для всех)
            issueButton = `<button class="btn btn-edit" onclick="showIssueForm(currentInstrument)">📝 Взять прибор</button>`;
        }

        let adminExtraHtml = '';
        if (hasAccess(['admin'])) {
            adminExtraHtml = `
                <div class="button-group" style="margin-top:0;">
                    <button class="btn btn-status ${inst.condition === 'free' ? 'active' : ''}" onclick="setCondition(currentInstrument, 'free')">Свободен</button>
                    <button class="btn btn-status ${inst.condition === 'busy' ? 'active' : ''}" onclick="setCondition(currentInstrument, 'busy')">Занят</button>
                    <button class="btn btn-status ${inst.condition === 'broken' ? 'active' : ''}" onclick="setCondition(currentInstrument, 'broken')">Не исправен</button>
                </div>
                <div class="button-group">
                    <button class="btn btn-edit" onclick="showEditAllForm(currentInstrument)">✏️ Редактировать прибор</button>
                    <button class="btn btn-delete" onclick="confirmDelete(currentInstrument)">🗑️ Удалить прибор</button>
                </div>
            `;
        }

        return `
        <div class="card">
            <div class="title">${escapeHtml(inst.name)}</div>
            <div class="badge ${verifClass}">${escapeHtml(verifText)}</div>
            <div class="field"><div class="field-label">Состояние</div>
                <div><span class="status-badge ${conditionClass}">${conditionText}</span></div>
            </div>
            <div class="field"><div class="field-label">Серийный номер</div><div class="field-value">${escapeHtml(inst.serial_number) || '—'}</div></div>
            <div class="field"><div class="field-label">Модель</div><div class="field-value">${escapeHtml(inst.model) || '—'}</div></div>
            <div class="field"><div class="field-label">Тип</div><div class="field-value">${escapeHtml(inst.type) || '—'}</div></div>
            <div class="field"><div class="field-label">${dateLabel}</div><div class="field-value">${escapeHtml(inst.verification_date) || '—'}</div></div>
            <div class="field"><div class="field-label">Действительно до</div><div class="field-value">${escapeHtml(inst.valid_until) || '—'}</div></div>
            <div class="field"><div class="field-label">Документ</div><div class="field-value">${docLink}</div></div>
            ${takenHtml}
            ${adminExtraHtml}
            <div class="button-group">
                ${issueButton}
                <button class="btn btn-qr" onclick="showQRModal(currentInstrument)">📱 QR-код</button>
                <button class="btn btn-edit" onclick="window.copyInstrumentInfo()">📋 Копировать информацию</button>
                <a href="?" class="btn btn-clear">← К списку</a>
            </div>
        </div>`;
    }

    // --- Список приборов (с умным поиском и сортировкой) ---
    function renderListContainer() {
        if (!currentInstruments.length) return '<div class="card"><h1>Оборудование</h1><div class="error">Нет данных</div></div>';
        
        sortInstrumentsById();
        
        let filtered = currentInstruments;
        if (searchQuery.trim() !== "") {
            const query = searchQuery.trim().toLowerCase();
            filtered = filtered.filter(inst => 
                inst.name.toLowerCase().includes(query) ||
                inst.serial_number.toLowerCase().includes(query) ||
                inst.model.toLowerCase().includes(query)
            );
        }
        if (verificationFilter !== "all") {
            filtered = filtered.filter(inst => getVerificationText(inst.valid_until) === verificationFilter);
        }
        if (conditionFilter !== "all") {
            filtered = filtered.filter(inst => getConditionText(inst.condition) === conditionFilter);
        }
        
        let html = '<div class="card"><h1>Оборудование</h1>';
        html += `<div class="filter-row">`;
        if (hasAccess(['admin'])) {
            html += `<button class="btn btn-add" onclick="showAddForm()">➕ Добавить прибор</button>`;
        } else {
            html += `<div></div>`;
        }
        html += `<div class="filter-selects">
                    <select id="verifFilterSelect" class="filter-select">
                        <option value="all" ${verificationFilter === 'all' ? 'selected' : ''}>Поверка: все</option>
                        <option value="поверен" ${verificationFilter === 'поверен' ? 'selected' : ''}>Поверен</option>
                        <option value="не поверен" ${verificationFilter === 'не поверен' ? 'selected' : ''}>Не поверен</option>
                        <option value="без поверки" ${verificationFilter === 'без поверки' ? 'selected' : ''}>Без поверки</option>
                    </select>
                    <select id="condFilterSelect" class="filter-select">
                        <option value="all" ${conditionFilter === 'all' ? 'selected' : ''}>Состояние: все</option>
                        <option value="свободен" ${conditionFilter === 'свободен' ? 'selected' : ''}>Свободен</option>
                        <option value="занят" ${conditionFilter === 'занят' ? 'selected' : ''}>Занят</option>
                        <option value="не исправен" ${conditionFilter === 'не исправен' ? 'selected' : ''}>Не исправен</option>
                    </select>
                </div>`;
        html += `</div>`;
        
        for (const inst of filtered) {
            const verifText = getVerificationText(inst.valid_until);
            const verifClass = getVerificationClass(inst.valid_until);
            const condText = getConditionText(inst.condition);
            const condClass = getConditionClass(inst.condition);
            html += `<a href="?id=${encodeURIComponent(inst.id)}" class="list-item">
                <span>#${escapeHtml(inst.id)} ${escapeHtml(inst.name)}</span>
                <div class="status-group">
                    <span class="badge ${verifClass}" style="margin:0;padding:4px 10px;">${escapeHtml(verifText)}</span>
                    <span class="status-badge ${condClass}">${escapeHtml(condText)}</span>
                </div>
            </a>`;
        }
        html += '</div>';
        return html;
    }

    // --- Главная страница ---
    function renderApp() {
        if (!currentUser) return;
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const appDiv = document.getElementById('app');
        if (!appDiv) return;
        
        if (id) {
            const inst = currentInstruments.find(i => String(i.id) === id);
            if (inst) {
                window.currentInstrument = inst;
                appDiv.innerHTML = renderCard(inst);
            } else {
                appDiv.innerHTML = `<div class="card error">Прибор не найден<br><a href="?" style="color:#2563eb;">← Назад</a></div>`;
            }
            return;
        }
        
        const roleText = currentUser.role === 'admin' ? 'Администратор' : currentUser.username;
        const userHtml = `
            <div class="user-info">
                <div class="user-card">
                    <span><strong>${roleText}</strong></span>
                    ${hasAccess(['admin']) ? `<button class="btn btn-add-user" onclick="showManageUsersForm()">👥 Управление сотрудниками</button>` : ''}
                    <button class="btn btn-edit" onclick="showEditProfileForm()">✏️ Редактировать профиль</button>
                    <button class="btn btn-logout" onclick="logout()">Выйти</button>
                </div>
            </div>
        `;
        const searchCardHtml = `
            <div class="card">
                <input type="text" class="search-box" id="globalSearchInput" placeholder="🔍 Умный поиск (название, серийный номер, модель)...">
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="btn btn-edit" onclick="showCalendarModal()">📅 Календарь поверок</button>
                </div>
            </div>
        `;
        const listContainerHtml = `<div id="listContainer"></div>`;
        
        appDiv.innerHTML = userHtml + searchCardHtml + listContainerHtml;
        
        const container = document.getElementById('listContainer');
        if (container) container.innerHTML = renderListContainer();
        
        const searchField = document.getElementById('globalSearchInput');
        if (searchField) {
            searchField.value = searchQuery;
            searchField.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                const listCont = document.getElementById('listContainer');
                if (listCont) listCont.innerHTML = renderListContainer();
                attachFilterEvents();
            });
        }
        attachFilterEvents();
    }
    
    function attachFilterEvents() {
        const verifSelect = document.getElementById('verifFilterSelect');
        const condSelect = document.getElementById('condFilterSelect');
        if (verifSelect) {
            verifSelect.removeEventListener('change', handleVerifSelectChange);
            verifSelect.addEventListener('change', handleVerifSelectChange);
        }
        if (condSelect) {
            condSelect.removeEventListener('change', handleCondSelectChange);
            condSelect.addEventListener('change', handleCondSelectChange);
        }
    }
    
    function handleVerifSelectChange(e) {
        verificationFilter = e.target.value;
        const container = document.getElementById('listContainer');
        if (container) container.innerHTML = renderListContainer();
        attachFilterEvents();
    }
    
    function handleCondSelectChange(e) {
        conditionFilter = e.target.value;
        const container = document.getElementById('listContainer');
        if (container) container.innerHTML = renderListContainer();
        attachFilterEvents();
    }

    // --- Инициализация ---
    (async () => {
        try {
            await initUsers();
            const { instruments, history } = await getTableData();
            currentInstruments = instruments;
            currentHistory = history;
            sortInstrumentsById();
            checkSession();
            if (currentUser) {
                renderApp();
            } else {
                document.getElementById('app').innerHTML = '';
            }
        } catch(e) {
            document.getElementById('app').innerHTML = `<div class="error">Ошибка загрузки: ${e.message}<br><br>Проверьте прокси и публичный ключ.</div>`;
            console.error(e);
        }
    })();

    document.getElementById('loginBtn').addEventListener('click', () => {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        login(username, password);
        if (currentInstruments.length === 0 && currentUser) {
            (async () => {
                try {
                    const { instruments, history } = await getTableData();
                    currentInstruments = instruments;
                    currentHistory = history;
                    sortInstrumentsById();
                    renderApp();
                } catch(e) {
                    document.getElementById('app').innerHTML = `<div class="error">Ошибка загрузки: ${e.message}<br><br>Проверьте прокси и публичный ключ.</div>`;
                    console.error(e);
                }
            })();
        } else if (currentUser) {
            renderApp();
        }
    });
</script>
</body>
</html>
