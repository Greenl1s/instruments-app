<!DOCTYPE html>

        .container { max-width: 600px; margin: 0 auto; }

        .title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .badge { display: inline-block; padding: 6px 14px; border-radius: 30px; font-size: 14px; font-weight: 600; margin-bottom: 20px; }
        .good { background: #dcfce7; color: #15803d; }
        .expired { background: #fee2e2; color: #b91c1c; }
        .no-date { background: #f1f5f9; color: #475569; }

        .field-label { font-size: 12px; font-weight: 600; text-transform: uppercase; color: #64748b; margin-bottom: 4px; }

        .btn-clear { background: #64748b; }
        .btn-qr { background: #8b5cf6; }
        .btn-save { background: #10b981; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 24px; padding: 24px; max-width: 500px; width: 90%; margin: 20px; max-height: 90vh; overflow-y: auto; text-align: left; }

        h1 { font-size: 24px; margin-bottom: 20px; }
        .button-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .issued-info { background: #fef3c7; padding: 12px; border-radius: 12px; margin-top: 10px; }
        .qr-container canvas { margin: 10px auto; border: 1px solid #e2e8f0; border-radius: 16px; padding: 10px; background: white; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 8px 16px; border-radius: 20px; font-size: 14px; z-index: 1100; }

<body>
<div class="container" id="app">Р вҖ”Р В°Р С–РЎРӮРЎС“Р В·Р С”Р В°...</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script>
    // ========== Р СңР С’Р РҺР СһР  Р СӣР в„ўР СҷР Вҳ (Р вҖ”Р С’Р СҡР вҖўР СңР ВҳР СһР вҖў Р СңР С’ Р вҖҷР С’Р РҒР Вҳ) ==========
    const PUBLIC_KEY = "ciFZRWIX5aqjNg";                     // Р вҖҷР В°РЎвӮ¬ Р С—РЎС“Р ВұР В»Р С‘РЎвҖЎР Р…РЎвҖ№Р в„– Р С”Р В»РЎРӢРЎвҖЎ
    const PROXY_URL = "https://autumn-queen-abbe.kirik7061.workers.dev/?url="; // Р вҖҷР В°РЎвӮ¬ Worker
    const WRITE_SECRET = "mySecretKey123";                   // Р РҺР ВөР С”РЎРӮР ВөРЎвҖҡР Р…РЎвҖ№Р в„– Р С”Р В»РЎРӢРЎвҖЎ (Р Т‘Р С•Р В»Р В¶Р ВөР Р… РЎРғР С•Р РҶР С—Р В°Р Т‘Р В°РЎвҖҡРЎРҠ РЎРғ Worker)
    const OAUTH_TOKEN = "y0__wgBEK3T6dMDGMuvQiCp95HVFzD38tqJCD_9zO1sUwHlVUnaAOeiJ_uRkBA1";                    // Р вҖҷР В°РЎвӮ¬ OAuth-РЎвҖҡР С•Р С”Р ВөР Р… РЎРғ Р С—РЎРӮР В°Р РҶР В°Р СҳР С‘ Р Р…Р В° Р В·Р В°Р С—Р С‘РЎРғРЎРҠ
    // =================================================

    let currentInstruments = [];

    function showMessage(msg, isError = false) {
        let toast = document.createElement('div');
        toast.className = 'toast';

    async function getTableData() {
        const yandexApiUrl = `https://cloud-api.yandex.net/v1/disk/public/resources/download?public_key=https://disk.yandex.ru/i/${PUBLIC_KEY}`;
        const proxiedApiUrl = PROXY_URL + encodeURIComponent(yandexApiUrl);
        const response = await fetch(proxiedApiUrl);
        if (!response.ok) throw new Error(`Р СӣРЎвӮ¬Р С‘Р ВұР С”Р В° API: ${response.status}`);
        const data = await response.json();
        if (!data.href) throw new Error("Р СңР ВөРЎвҖҡ РЎРғРЎРғРЎвҖ№Р В»Р С”Р С‘ Р Р…Р В° РЎРғР С”Р В°РЎвҖЎР С‘Р РҶР В°Р Р…Р С‘Р Вө");
        const proxiedFileUrl = PROXY_URL + encodeURIComponent(data.href);
        const fileResponse = await fetch(proxiedFileUrl);
        if (!fileResponse.ok) throw new Error(`Р СӣРЎвӮ¬Р С‘Р ВұР С”Р В° Р В·Р В°Р С–РЎРӮРЎС“Р В·Р С”Р С‘ РЎвҖһР В°Р в„–Р В»Р В°: ${fileResponse.status}`);
        const blob = await fileResponse.blob();
        if (blob.size < 100) throw new Error("Р РҺР С”Р В°РЎвҖЎР В°Р Р… Р С—РЎС“РЎРғРЎвҖҡР С•Р в„– РЎвҖһР В°Р в„–Р В»");
        return await readExcelFromBlob(blob);
    }

    function readExcelFromBlob(blob) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: "" });
                    if (!rows || rows.length < 2) { resolve([]); return; }
                    const instruments = [];
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (!row || row.length === 0) continue;
                        if (row[0] === undefined || row[0] === "") continue;
                        instruments.push({
                            id: String(row[0]),
                            name: row[1] || '',
                            serial_number: row[2] || '',
                            model: row[3] || '',
                            type: row[4] || '',
                            verification_date: formatDateFromExcel(row[5]),
                            valid_until: formatDateFromExcel(row[6]),
                            document_url: row[7] || '',
                            taken_by: row[10] || '',
                            taken_where: row[11] || '',
                            taken_date: formatDateFromExcel(row[12])
                        });
                    }
                    resolve(instruments);
                } catch(e) { reject(e); }
            };
            reader.onerror = reject;
            reader.readAsArrayBuffer(blob);
        });
    }

    function formatDateFromExcel(dateValue) {
        if (!dateValue) return '';
        let str = String(dateValue).trim();
        const match = str.match(/(\d{4})-(\d{2})-(\d{2})/);
        if (match) return match[0];
        if (typeof dateValue === 'number') {
            const date = new Date((dateValue - 25569) * 86400 * 1000);
            if (!isNaN(date.getTime())) return date.toISOString().slice(0,10);
        }
        return str.slice(0,10);
    }

    function getStatus(validUntil) {
        if (!validUntil || validUntil === '-') return 'Р ВұР ВөР В· РЎРғРЎРӮР С•Р С”Р В°';
        const today = new Date().toISOString().slice(0,10);
        return validUntil < today ? 'Р С—РЎРӮР С•РЎРғРЎРӮР С•РЎвҖЎР ВөР Р…' : 'Р С–Р С•Р Т‘Р ВөР Р…';
    }

    function showModal(title, content) {
        let modal = document.getElementById('customModal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'customModal';
            modal.className = 'modal';
            modal.innerHTML = `<div class="modal-content"><h3 id="modalTitle"></h3><div id="modalBody"></div><button class="btn btn-small" id="modalCloseBtn">Р вҖ”Р В°Р С”РЎРӮРЎвҖ№РЎвҖҡРЎРҠ</button></div>`;
            document.body.appendChild(modal);
            document.getElementById('modalCloseBtn').onclick = () => modal.style.display = 'none';
        }
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerHTML = content;
        modal.style.display = 'flex';
    }

    function showQRModal(instrument) {
        const currentUrl = window.location.href.split('?')[0];
        const cardUrl = `${currentUrl}?id=${encodeURIComponent(instrument.id)}`;
        const content = `<div class="qr-container"><p><strong>${escapeHtml(instrument.name)}</strong></p><div id="qr-code"></div><button class="btn btn-small" id="downloadQR">Р РҺР С”Р В°РЎвҖЎР В°РЎвҖҡРЎРҠ QR</button></div>`;
        showModal(`QR-Р С”Р С•Р Т‘ #${instrument.id}`, content);
        setTimeout(() => {
            new QRCode(document.getElementById("qr-code"), { text: cardUrl, width: 200, height: 200 });
            document.getElementById('downloadQR').onclick = () => {
                const canvas = document.querySelector('#qr-code canvas');
                if (canvas) {
                    const link = document.createElement('a');
                    link.download = `QR_${instrument.id}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                }
            };
        }, 100);
    }

    async function saveInstrumentsToYandex() {
    if (!OAUTH_TOKEN || OAUTH_TOKEN === 'y0__Р вҖҷР С’Р РҒ_Р СһР СӣР СҷР вҖўР Сң') {
        showMessage("РІСңРҠ Р РҲР С”Р В°Р В¶Р С‘РЎвҖҡР Вө OAuth-РЎвҖҡР С•Р С”Р ВөР Р… Р РҶ Р С”Р С•Р Т‘Р Вө РЎРғР В°Р в„–РЎвҖҡР В°", true);
        console.error("Р СһР С•Р С”Р ВөР Р… Р Р…Р Вө Р В·Р В°Р Т‘Р В°Р Р…");
        return;
    }
    try {
        showMessage("Р СҹР С•Р Т‘Р С–Р С•РЎвҖҡР С•Р РҶР С”Р В° Р С” РЎРғР С•РЎвҖҰРЎРӮР В°Р Р…Р ВөР Р…Р С‘РЎРӢ...");
        const proxyBase = PROXY_URL.split('?')[0];
        console.log("Р вҖ”Р В°Р С—РЎРӮР В°РЎвӮ¬Р С‘Р РҶР В°Р ВөР Сҳ РЎРғРЎРғРЎвҖ№Р В»Р С”РЎС“ Р Т‘Р В»РЎРҸ Р В·Р В°Р С–РЎРӮРЎС“Р В·Р С”Р С‘ РЎС“ Worker...");
        const response = await fetch(`${proxyBase}?get_upload_url=1`, {
            headers: { 'X-Write-Secret': WRITE_SECRET }
        });
        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error || `HTTP ${response.status}`);
        }
        const { href } = await response.json();
        if (!href) throw new Error("Р СңР ВөРЎвҖҡ РЎРғРЎРғРЎвҖ№Р В»Р С”Р С‘ Р Т‘Р В»РЎРҸ Р В·Р В°Р С–РЎРӮРЎС“Р В·Р С”Р С‘");
        console.log("Р РҺРЎРғРЎвҖ№Р В»Р С”Р В° Р Т‘Р В»РЎРҸ Р В·Р В°Р С–РЎРӮРЎС“Р В·Р С”Р С‘ Р С—Р С•Р В»РЎС“РЎвҖЎР ВөР Р…Р В°:", href);

        // Р РҺР С•Р В·Р Т‘Р В°Р Р…Р С‘Р Вө Excel
        const wsData = currentInstruments.map(inst => [
            inst.id, inst.name, inst.serial_number, inst.model, inst.type,
            inst.verification_date, inst.valid_until, inst.document_url,
            inst.taken_by, inst.taken_where, inst.taken_date
        ]);
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Р СҹРЎРӮР С‘Р ВұР С•РЎРӮРЎвҖ№");
        const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
        const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

        console.log("Р СӣРЎвҖҡР С—РЎРӮР В°Р РҶР В»РЎРҸР ВөР Сҳ PUT-Р В·Р В°Р С—РЎРӮР С•РЎРғ Р Р…Р В° Р вҖқР С‘РЎРғР С”...");
        const putResponse = await fetch(href, {
            method: 'PUT',
            body: blob,
            headers: { 'Content-Type': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }
        });
        if (!putResponse.ok) {
            const errorText = await putResponse.text();
            throw new Error(`Р СӣРЎвӮ¬Р С‘Р ВұР С”Р В° Р В·Р В°Р С–РЎРӮРЎС“Р В·Р С”Р С‘: ${putResponse.status} ${errorText}`);
        }
        console.log("PUT РЎС“РЎРғР С—Р ВөРЎвӮ¬Р ВөР Р…, РЎРғРЎвҖҡР В°РЎвҖҡРЎС“РЎРғ:", putResponse.status);
        showMessage("РІСҡвҖҰ Р вҖқР В°Р Р…Р Р…РЎвҖ№Р Вө РЎРғР С•РЎвҖҰРЎРӮР В°Р Р…Р ВөР Р…РЎвҖ№ Р Р…Р В° Р РҮР Р…Р Т‘Р ВөР С”РЎРғ.Р вҖқР С‘РЎРғР С”!");
        // Р СңР вҖў Р С—Р ВөРЎРӮР ВөР В·Р В°Р С–РЎРӮРЎС“Р В¶Р В°Р ВөР Сҳ Р Т‘Р В°Р Р…Р Р…РЎвҖ№Р Вө РЎРғ Р Т‘Р С‘РЎРғР С”Р В°, РЎвҖЎРЎвҖҡР С•Р ВұРЎвҖ№ Р Р…Р Вө РЎвҖҡР ВөРЎРӮРЎРҸРЎвҖҡРЎРҠ Р С‘Р В·Р СҳР ВөР Р…Р ВөР Р…Р С‘РЎРҸ Р РҶ Р С—Р В°Р СҳРЎРҸРЎвҖҡР С‘
    } catch (err) {
        console.error("Р СӣРЎвӮ¬Р С‘Р ВұР С”Р В° Р С—РЎРӮР С‘ РЎРғР С•РЎвҖҰРЎРӮР В°Р Р…Р ВөР Р…Р С‘Р С‘:", err);
        showMessage("РІСңРҠ Р СӣРЎвӮ¬Р С‘Р ВұР С”Р В° РЎРғР С•РЎвҖҰРЎРӮР В°Р Р…Р ВөР Р…Р С‘РЎРҸ: " + err.message, true);
    }
}

            <div class="form-group"><label>Р РҺР ВөРЎРӮР С‘Р в„–Р Р…РЎвҖ№Р в„– Р Р…Р С•Р СҳР ВөРЎРӮ</label><input type="text" id="edit_serial" value="${escapeHtml(instrument.serial_number)}"></div>
            <div class="form-group"><label>Р СҡР С•Р Т‘Р ВөР В»РЎРҠ</label><input type="text" id="edit_model" value="${escapeHtml(instrument.model)}"></div>
            <div class="form-group"><label>Р СһР С‘Р С— Р Т‘Р С•Р С”РЎС“Р СҳР ВөР Р…РЎвҖҡР В°</label><input type="text" id="edit_type" value="${escapeHtml(instrument.type)}"></div>
            <div class="form-group"><label>Р вҖқР В°РЎвҖҡР В° Р С—Р С•Р РҶР ВөРЎРӮР С”Р С‘</label><input type="date" id="edit_verif" value="${instrument.verification_date || ''}"></div>
            <div class="form-group"><label>Р вҖқР ВөР в„–РЎРғРЎвҖҡР РҶР С‘РЎвҖҡР ВөР В»РЎРҠР Р…Р С• Р Т‘Р С•</label><input type="date" id="edit_valid" value="${instrument.valid_until || ''}"></div>
            <div class="form-group"><label>Р РҺРЎРғРЎвҖ№Р В»Р С”Р В° Р Р…Р В° Р Т‘Р С•Р С”РЎС“Р СҳР ВөР Р…РЎвҖҡ</label><input type="text" id="edit_doc" value="${escapeHtml(instrument.document_url)}"></div>
            <div class="form-group"><label>Р СҷРЎвҖҡР С• Р РҶР В·РЎРҸР В»</label><input type="text" id="edit_taken_by" value="${escapeHtml(instrument.taken_by)}"></div>
            <div class="form-group"><label>Р СҷРЎС“Р Т‘Р В° Р РҶР В·РЎРҸР В»</label><input type="text" id="edit_taken_where" value="${escapeHtml(instrument.taken_where)}"></div>
            <div class="form-group"><label>Р вҖқР В°РЎвҖҡР В° Р РҶРЎвҖ№Р Т‘Р В°РЎвҖЎР С‘</label><input type="date" id="edit_taken_date" value="${instrument.taken_date || ''}"></div>

            <button class="btn btn-clear" id="cancelAllBtn">Р СӣРЎвҖҡР СҳР ВөР Р…Р В°</button>

        document.getElementById('saveAllBtn').onclick = () => {
            instrument.name = document.getElementById('edit_name').value;

        document.getElementById('cancelAllBtn').onclick = () => {

    }

    function showEditForm(instrument) {
        const today = new Date().toISOString().slice(0,10);
        const formHtml = `
            <div class="form-group"><label>Р ВӨР ВҳР Сӣ РЎРғР С•РЎвҖҡРЎРӮРЎС“Р Т‘Р Р…Р С‘Р С”Р В°</label><input type="text" id="takenBy" value="${escapeHtml(instrument.taken_by)}"></div>
            <div class="form-group"><label>Р СҷРЎС“Р Т‘Р В° Р РҶР В·РЎРҸР В»</label><input type="text" id="takenWhere" value="${escapeHtml(instrument.taken_where)}"></div>
            <div class="form-group"><label>Р вҖқР В°РЎвҖҡР В° Р РҶРЎвҖ№Р Т‘Р В°РЎвҖЎР С‘</label><input type="date" id="takenDate" value="${instrument.taken_date || today}"></div>
            <button class="btn btn-edit" id="saveBtn">Р РҺР С•РЎвҖҰРЎРӮР В°Р Р…Р С‘РЎвҖҡРЎРҠ</button>
            <button class="btn btn-clear" id="clearBtn">Р СӣРЎвҖЎР С‘РЎРғРЎвҖҡР С‘РЎвҖҡРЎРҠ</button>
        `;
        showModal(`Р вҖҷР В·РЎРҸРЎвҖҡРЎРҠ Р С—РЎРӮР С‘Р ВұР С•РЎРӮ: ${escapeHtml(instrument.name)}`, formHtml);
        document.getElementById('saveBtn').onclick = () => {
            instrument.taken_by = document.getElementById('takenBy').value;
            instrument.taken_where = document.getElementById('takenWhere').value;
            instrument.taken_date = document.getElementById('takenDate').value;
            document.getElementById('customModal').style.display = 'none';
            renderApp();
            saveInstrumentsToYandex();
        };
        document.getElementById('clearBtn').onclick = () => {
            instrument.taken_by = '';
            instrument.taken_where = '';
            instrument.taken_date = '';
            document.getElementById('customModal').style.display = 'none';
            renderApp();
            saveInstrumentsToYandex();
        };
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderCard(inst) {
        const status = getStatus(inst.valid_until);
        const statusClass = status === 'Р С–Р С•Р Т‘Р ВөР Р…' ? 'good' : (status === 'Р С—РЎРӮР С•РЎРғРЎРӮР С•РЎвҖЎР ВөР Р…' ? 'expired' : 'no-date');
        const hasTaken = inst.taken_by && inst.taken_by.trim() !== '';
        const takenHtml = hasTaken ? `
            <div class="issued-info">
                <div class="field"><div class="field-label">Р СҷРЎвҖҡР С• Р РҶР В·РЎРҸР В»</div><div class="field-value">${escapeHtml(inst.taken_by)}</div></div>
                <div class="field"><div class="field-label">Р СҷРЎС“Р Т‘Р В° Р РҶР В·РЎРҸР В»</div><div class="field-value">${escapeHtml(inst.taken_where) || 'РІРӮвҖқ'}</div></div>
                <div class="field"><div class="field-label">Р вҖқР В°РЎвҖҡР В° Р РҶРЎвҖ№Р Т‘Р В°РЎвҖЎР С‘</div><div class="field-value">${escapeHtml(inst.taken_date) || 'РІРӮвҖқ'}</div></div>
            </div>
        ` : '';
        const docLink = inst.document_url && inst.document_url !== 'nan' ? `<a href="${escapeHtml(inst.document_url)}" target="_blank">СҖСҹвҖңвҖһ Р СӣРЎвҖҡР С”РЎРӮРЎвҖ№РЎвҖҡРЎРҠ Р Т‘Р С•Р С”РЎС“Р СҳР ВөР Р…РЎвҖҡ</a>` : 'РІРӮвҖқ';
        return `
        <div class="card">
            <div class="title">${escapeHtml(inst.name)}</div>
            <div class="badge ${statusClass}">${escapeHtml(status)}</div>
            <div class="field"><div class="field-label">Р РҺР ВөРЎРӮР С‘Р в„–Р Р…РЎвҖ№Р в„– Р Р…Р С•Р СҳР ВөРЎРӮ</div><div class="field-value">${escapeHtml(inst.serial_number) || 'РІРӮвҖқ'}</div></div>
            <div class="field"><div class="field-label">Р СҡР С•Р Т‘Р ВөР В»РЎРҠ</div><div class="field-value">${escapeHtml(inst.model) || 'РІРӮвҖқ'}</div></div>
            <div class="field"><div class="field-label">Р СһР С‘Р С—</div><div class="field-value">${escapeHtml(inst.type) || 'РІРӮвҖқ'}</div></div>
            <div class="field"><div class="field-label">Р вҖқР В°РЎвҖҡР В° Р С—Р С•Р РҶР ВөРЎРӮР С”Р С‘</div><div class="field-value">${escapeHtml(inst.verification_date) || 'РІРӮвҖқ'}</div></div>
            <div class="field"><div class="field-label">Р вҖқР ВөР в„–РЎРғРЎвҖҡР РҶР С‘РЎвҖҡР ВөР В»Р ВөР Р… Р Т‘Р С•</div><div class="field-value">${escapeHtml(inst.valid_until) || 'РІРӮвҖқ'}</div></div>
            <div class="field"><div class="field-label">Р вҖқР С•Р С”РЎС“Р СҳР ВөР Р…РЎвҖҡ</div><div class="field-value">${docLink}</div></div>
            ${takenHtml}
            <div class="button-group">
                <button class="btn btn-edit" onclick="showEditForm(currentInstrument)">СҖСҹвҖңСң Р вҖҷР В·РЎРҸРЎвҖҡРЎРҠ Р С—РЎРӮР С‘Р ВұР С•РЎРӮ</button>
                <button class="btn btn-clear" onclick="(() => { currentInstrument.taken_by = ''; currentInstrument.taken_where = ''; currentInstrument.taken_date = ''; renderApp(); saveInstrumentsToYandex(); })()">СҖСҹвҖңВҰ Р СҹР С•Р В»Р С•Р В¶Р С‘РЎвҖҡРЎРҠ Р С—РЎРӮР С‘Р ВұР С•РЎРӮ</button>
                <button class="btn btn-edit" onclick="showEditAllForm(currentInstrument)">РІСҡРҸРҝС‘РҸ Р  Р ВөР Т‘Р В°Р С”РЎвҖҡР С‘РЎРӮР С•Р РҶР В°РЎвҖҡРЎРҠ Р С—РЎРӮР С‘Р ВұР С•РЎРӮ</button>
                <button class="btn btn-qr" onclick="showQRModal(currentInstrument)">СҖСҹвҖңВұ QR-Р С”Р С•Р Т‘</button>
                <button class="btn btn-save" onclick="saveInstrumentsToYandex()">СҖСҹвҖҷС• Р РҺР С•РЎвҖҰРЎРӮР В°Р Р…Р С‘РЎвҖҡРЎРҠ Р Р…Р В° Р вҖқР С‘РЎРғР С”</button>
                <a href="?" class="btn btn-clear">РІвҖ С’ Р Сҷ РЎРғР С—Р С‘РЎРғР С”РЎС“</a>
            </div>
        </div>`;
    }

    function renderList() {
        if (!currentInstruments.length) return '<div class="card"><h1>Р СӣР ВұР С•РЎРӮРЎС“Р Т‘Р С•Р РҶР В°Р Р…Р С‘Р Вө</h1><div class="error">Р СңР ВөРЎвҖҡ Р Т‘Р В°Р Р…Р Р…РЎвҖ№РЎвҖҰ</div></div>';
        let html = '<div class="card"><h1>Р СӣР ВұР С•РЎРӮРЎС“Р Т‘Р С•Р РҶР В°Р Р…Р С‘Р Вө</h1>';
        html += `<div class="button-group"><button class="btn btn-save" onclick="saveInstrumentsToYandex()">СҖСҹвҖҷС• Р РҺР С•РЎвҖҰРЎРӮР В°Р Р…Р С‘РЎвҖҡРЎРҠ Р РҶРЎРғР Вө Р С‘Р В·Р СҳР ВөР Р…Р ВөР Р…Р С‘РЎРҸ Р Р…Р В° Р вҖқР С‘РЎРғР С”</button></div>`;
        for (const inst of currentInstruments) {
            const status = getStatus(inst.valid_until);
            const statusClass = status === 'Р С–Р С•Р Т‘Р ВөР Р…' ? 'good' : (status === 'Р С—РЎРӮР С•РЎРғРЎРӮР С•РЎвҖЎР ВөР Р…' ? 'expired' : 'no-date');
            const takenIcon = inst.taken_by ? 'СҖСҹвҖңВӨ' : 'РІСҡвҖҰ';
            html += `<a href="?id=${encodeURIComponent(inst.id)}" class="list-item">
                <span>#${escapeHtml(inst.id)} ${escapeHtml(inst.name)}</span>
                <span><span class="badge ${statusClass}" style="margin:0;padding:4px 10px;">${escapeHtml(status)}</span> ${takenIcon}</span>
            </a>`;
        }
        html += '</div>';
        return html;
    }

    function renderApp() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const appDiv = document.getElementById('app');
        if (!appDiv) return;
        if (id) {
            const inst = currentInstruments.find(i => String(i.id) === id);
            if (inst) {
                window.currentInstrument = inst;
                appDiv.innerHTML = renderCard(inst);
            } else {
                appDiv.innerHTML = `<div class="error">Р СҹРЎРӮР С‘Р ВұР С•РЎРӮ Р Р…Р Вө Р Р…Р В°Р в„–Р Т‘Р ВөР Р…<br><a href="?" style="color:#2563eb;">РІвҖ С’ Р СңР В°Р В·Р В°Р Т‘</a></div>`;
            }
        } else {
            appDiv.innerHTML = renderList();
        }
    }

    (async () => {
        try {
            currentInstruments = await getTableData();
            renderApp();
        } catch(e) {
            document.getElementById('app').innerHTML = `<div class="error">Р СӣРЎвӮ¬Р С‘Р ВұР С”Р В° Р В·Р В°Р С–РЎРӮРЎС“Р В·Р С”Р С‘: ${e.message}<br><br>Р СҹРЎРӮР С•Р РҶР ВөРЎРӮРЎРҠРЎвҖҡР Вө Р С—РЎРӮР С•Р С”РЎРғР С‘ Р С‘ Р С—РЎС“Р ВұР В»Р С‘РЎвҖЎР Р…РЎвҖ№Р в„– Р С”Р В»РЎРӢРЎвҖЎ.</div>`;
            console.error(e);
        }
    })();
</script>
</body>
</html>
